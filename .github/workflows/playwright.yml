name: Adactin Hotel Playwright

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ensure Browsers are Installed
      run: playwright install --with-deps

    - name: Run All Automation Tests (Parallel Mode)
      env:
        BASE_URL: ${{ secrets.BASE_URL }}
        ADACTIN_USERNAME: ${{ secrets.ADACTIN_USERNAME }}
        ADACTIN_PASSWORD: ${{ secrets.ADACTIN_PASSWORD }}
      # dbus-run-session menjamin kestabilan browser headless saat berjalan paralel di Linux
      run: |
        dbus-run-session -- pytest -n auto --alluredir=allure-results

    - name: Upload Allure Results Artifact
      uses: actions/upload-artifact@v4
      if: always() # Tetap unggah hasil laporan walaupun ada test yang gagal
      with:
        name: allure-results
        path: allure-results/
        retention-days: 10